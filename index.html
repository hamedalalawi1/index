<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="محفظتي">
    
    <title>تطبيق المصاريف الذكي - شهري</title>
    <style>
        :root {
            --bg-main: #111827;
            --bg-card: #1F2937;
            --bg-input: #374151;
            --text-main: #F9FAFB;
            --text-muted: #9CA3AF;
            --accent: #10B981;
            --danger: #EF4444;
            --warning: #F59E0B;
            --primary: #3B82F6;
            --border-color: #374151;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            padding: 20px;
            padding-top: max(20px, env(safe-area-inset-top));
            padding-bottom: max(40px, env(safe-area-inset-bottom));
        }

        .app-container {
            max-width: 480px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-top: 10px;
        }

        .user-info h1 { font-size: 24px; font-weight: 800; }
        .user-info p { color: var(--text-muted); font-size: 14px; margin-top: 4px; }
        .header-actions { display: flex; gap: 12px; align-items: center; }

        .avatar {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            color: white;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }
        
        .action-btn-top {
            width: 45px;
            height: 45px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            cursor: pointer;
            font-size: 20px;
        }

        .balance-card {
            background: linear-gradient(145deg, var(--bg-card), #1A2133);
            border-radius: 24px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            margin-bottom: 25px;
        }

        .balance-label {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 5px;
        }

        .balance-amount {
            font-size: 36px;
            font-weight: 800;
            display: flex;
            align-items: baseline;
            gap: 5px;
            margin-bottom: 20px;
        }

        .balance-currency { font-size: 18px; color: var(--text-muted); font-weight: 500; }

        .budget-tracker {
            background: rgba(255,255,255,0.03);
            padding: 15px;
            border-radius: 16px;
        }

        .budget-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 13px;
        }

        .budget-header span:first-child { color: var(--text-muted); }
        .budget-header span:last-child { font-weight: bold; }

            height: 8px
