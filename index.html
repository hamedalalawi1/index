<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="محفظتي">

    <title>تطبيق المصاريف الذكي - شهري</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-main: #0B0F19;
            --bg-card: #151A28;
            --bg-input: #1E2536;
            --text-main: #F1F5F9;
            --text-muted: #94A3B8;
            --accent: #10B981;
            --danger: #EF4444;
            --warning: #F59E0B;
            --primary: #3B82F6;
            --border-color: #2E364F;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Tajawal', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            padding-top: env(safe-area-inset-top);
            padding-bottom: calc(40px + env(safe-area-inset-bottom));
        }

        .app-container {
            max-width: 480px;
            margin: 0 auto;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            padding-top: 10px;
        }

        .user-info h1 { font-size: 24px; font-weight: 800; }
        .user-info p { color: var(--text-muted); font-size: 14px; }
        .header-actions { display: flex; gap: 12px; align-items: center; }

        .avatar {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            color: white;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.4);
        }
        
        .action-btn-top {
            width: 45px;
            height: 45px;
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            cursor: pointer;
            transition: 0.2s;
        }
        
        .action-btn-top:active { background: var(--bg-input); }

        .balance-card {
            background: linear-gradient(145deg, var(--bg-card), #1A2133);
            border-radius: 24px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            margin-bottom: 25px;
            position: relative;
            overflow: hidden;
        }

        .balance-label {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 5px;
        }

        .balance-amount {
            font-size: 36px;
            font-weight: 800;
            display: flex;
            align-items: baseline;
            gap: 5px;
            margin-bottom: 20px;
        }

        .balance-currency { font-size: 18px; color: var(--text-muted); font-weight: 500; }

        .budget-tracker {
            background: rgba(255,255,255,0.03);
            padding: 15px;
            border-radius: 16px;
        }

        .budget-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 13px;
        }

        .budget-header span:first-child { color: var(--text-muted); }
        .budget-header span:last-child { font-weight: bold; }

        .progress-bg {
            height: 8px;
            background: var(--bg-input);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--accent);
            border-radius: 4px;
            width: 0%;
            transition: width 0.5s ease, background-color 0.3s ease;
        }

        .quick-add-section {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            border: 1px solid var(--border-color);
        }

        .section-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .form-group { margin-bottom: 15px; }
        .input-row { display: flex; gap: 10px; }

        input, select {
            width: 100%;
            background: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 14px 16px;
            border-radius: 12px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
            appearance: none;
        }

        input:focus, select:focus { border-color: var(--primary); }

        .btn-add {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px
